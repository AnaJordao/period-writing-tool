name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      #############################
      # Frontend
      #############################

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Check frontend coverage
        working-directory: frontend
        run: |
          ls -la
          ls -la coverage || true

      #############################
      # Backend
      #############################

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      #############################
      # Publish test results
      #############################

      - name: Verify test reports
        if: always()
        run: |
          find . -name "*.xml"


      - name: Publish frontend tests
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Tests
          path: frontend/test-results/frontend-tests.xml
          reporter: java-junit
          fail-on-error: true
          list-tests: all

      - name: Publish backend tests
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: backend/test-results/backend-tests.xml
          reporter: java-junit
          fail-on-error: true
          list-tests: all

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            frontend/test-results/frontend-tests.xml
            backend/test-results/backend-tests.xml

      #############################
      # Upload coverage
      #############################

      - name: Check coverage files
        run: find . -name "lcov.info"

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend
          fail_ci_if_error: true
          disable_search: true

      - name: Upload backend coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          name: backend
          fail_ci_if_error: true
          disable_search: true

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      #############################
      # Create PR summary
      #############################
        
      - name: Build PR summary
        if: github.event_name == 'pull_request'
        run: node .github/scripts/test-summary.mjs

      - name: Find previous comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "# 🚀 CI Report"

      - name: Create or update comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: test-summary.md
          edit-mode: replace